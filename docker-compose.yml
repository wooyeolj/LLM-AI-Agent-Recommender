version: '3.8'

services:
  app:
    build: .
    container_name: llm-recommender-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./data:/app/data
      - hf_cache:/root/.cache/huggingface   # 모델 재다운로드 방지
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    environment:
      # .env 값보다 우선 적용 (Docker 내부에서는 host.docker.internal로 Ollama 접근)
      - OLLAMA_URL=http://host.docker.internal:11434
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: .
    container_name: llm-recommender-ui
    restart: unless-stopped
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    depends_on:
      - app
    env_file:
      - .env
    environment:
      # Docker 내부 네트워크로 FastAPI에 연결 (.env의 BACKEND_URL보다 우선)
      - BACKEND_URL=http://app:8000
    command: streamlit run frontend.py --server.port 8501 --server.address 0.0.0.0

volumes:
  hf_cache:   # BGE-M3-ko + bge-reranker 모델 캐시 (재빌드 시 재다운로드 방지)
