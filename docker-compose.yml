version: '3.8'

services:
  app:
    build: .
    container_name: llm-recommender-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # LLM 엔드포인트 — 로컬 Ollama, Colab ngrok URL 등으로 교체 가능
      - OLLAMA_URL=http://host.docker.internal:11434
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: .
    container_name: llm-recommender-ui
    restart: unless-stopped
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    depends_on:
      - app
    environment:
      # Docker 내부 네트워크로 FastAPI에 연결
      - BACKEND_URL=http://app:8000
    command: streamlit run frontend.py --server.port 8501 --server.address 0.0.0.0
